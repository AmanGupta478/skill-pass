name: Publish Docker Images

on:
  workflow_call:

permissions:
  contents: read

jobs:
  publish-frontend-image:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skill-pass-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skill-pass-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-backend-image:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skill-pass-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skill-pass-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max