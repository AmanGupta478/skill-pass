services:
  db:
    image: postgres:15-alpine
    container_name: skillpass_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skillpass

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: skillpass_backend
    container_name: skillpass_backend
    ports:
      - "8000:8080"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - skillpass

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    image: skillpass_frontend
    container_name: skillpass_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      backend:
        condition: service_started
    networks:
      - skillpass

volumes:
  db_data:

networks:
  skillpass:
    driver: bridge